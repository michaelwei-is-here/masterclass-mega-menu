<html lang="en">

<title>MasterClass – Mega Menu Concept</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: #0a0a0a;
    color: #fff;
    min-height: 100vh;
  }

  /* ── Top bar ── */
  .top-bar {
    display: flex;
    gap: 24px;
    padding: 8px 40px;
    font-size: 13px;
    color: #aaa;
    border-bottom: 1px solid #1a1a1a;
  }
  .top-bar a { color: #aaa; text-decoration: none; }
  .top-bar a:first-child { color: #fff; font-weight: 600; }

  /* ── Nav ── */
  nav {
    display: flex;
    align-items: center;
    padding: 12px 40px;
    border-bottom: 1px solid #1a1a1a;
    position: relative;
    z-index: 100;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 8px;
    font-weight: 700;
    font-size: 18px;
    letter-spacing: -0.5px;
    margin-right: 24px;
  }
  .logo svg { width: 28px; height: 28px; }

  .browse-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    background: #1e1e1e;
    border: 1px solid #333;
    color: #fff;
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s;
  }
  .browse-btn:hover, .browse-btn.active { background: #2a2a2a; }
  .browse-btn .chevron {
    transition: transform 0.2s;
    font-size: 10px;
  }
  .browse-btn.active .chevron { transform: rotate(180deg); }

  .search-box {
    flex: 1;
    max-width: 420px;
    margin-left: 16px;
    position: relative;
  }
  .search-box input {
    width: 100%;
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    color: #fff;
    padding: 10px 16px 10px 40px;
    border-radius: 8px;
    font-size: 14px;
    outline: none;
  }
  .search-box input::placeholder { color: #666; }
  .search-box input:focus { border-color: #444; }
  .search-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: #666;
    font-size: 14px;
  }

  .nav-right {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 20px;
    font-size: 14px;
  }
  .nav-right a { color: #ccc; text-decoration: none; }
  .get-btn {
    background: #fff;
    color: #000;
    padding: 10px 20px;
    border-radius: 8px;
    font-weight: 600;
    font-size: 14px;
    text-decoration: none;
    border: none;
    cursor: pointer;
  }

  /* ── Mega Menu ── */
  .mega-menu-overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 50;
  }
  .mega-menu-overlay.open { display: block; }

  .mega-menu {
    display: none;
    position: absolute;
    top: 100%;
    left: 0;
    right: 0;
    background: #141414;
    border-bottom: 1px solid #2a2a2a;
    z-index: 90;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    animation: menuSlide 0.2s ease-out;
  }
  .mega-menu.open { display: flex; }

  @keyframes menuSlide {
    from { opacity: 0; transform: translateY(-8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .menu-categories {
    width: 280px;
    border-right: 1px solid #222;
    padding: 8px 0;
    flex-shrink: 0;
    max-height: 520px;
    overflow-y: auto;
  }

  .cat-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 11px 20px;
    cursor: pointer;
    transition: background 0.1s;
    font-size: 14px;
    color: #bbb;
    position: relative;
  }
  .cat-item:hover, .cat-item.active {
    background: #1e1e1e;
    color: #fff;
  }
  .cat-item.active::after {
    content: '';
    position: absolute;
    right: 0;
    top: 8px;
    bottom: 8px;
    width: 2px;
    background: #e53935;
    border-radius: 1px;
  }
  .cat-icon {
    width: 20px;
    text-align: center;
    font-size: 16px;
    flex-shrink: 0;
  }
  .cat-label { flex: 1; }
  .cat-count {
    font-size: 11px;
    color: #666;
    background: #1a1a1a;
    padding: 2px 7px;
    border-radius: 10px;
  }
  .cat-item.active .cat-count { background: #2a2a2a; color: #888; }

  /* ── Right panel ── */
  .menu-detail {
    flex: 1;
    padding: 24px 28px;
    max-height: 520px;
    overflow-y: auto;
  }

  .detail-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }
  .detail-header h2 {
    font-size: 16px;
    font-weight: 600;
  }
  .view-all-link {
    font-size: 13px;
    color: #e53935;
    text-decoration: none;
    font-weight: 500;
  }
  .view-all-link:hover { text-decoration: underline; }

  .subcategories {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 24px;
  }
  .subcat-chip {
    padding: 6px 14px;
    background: #1e1e1e;
    border: 1px solid #2a2a2a;
    border-radius: 20px;
    font-size: 12px;
    color: #aaa;
    cursor: pointer;
    transition: all 0.15s;
  }
  .subcat-chip:hover {
    border-color: #555;
    color: #fff;
    background: #252525;
  }

  .instructors-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
  }

  .instructor-card {
    cursor: pointer;
    border-radius: 10px;
    overflow: hidden;
    background: #1a1a1a;
    transition: transform 0.15s, box-shadow 0.15s;
    position: relative;
  }
  .instructor-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }
  .card-img {
    width: 100%;
    aspect-ratio: 3/4;
    background-size: cover;
    background-position: center top;
    position: relative;
  }
  .card-img::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 60%;
    background: linear-gradient(transparent, rgba(0,0,0,0.85));
  }
  .card-info {
    padding: 12px 14px;
  }
  .card-name {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 3px;
  }
  .card-topic {
    font-size: 12px;
    color: #888;
    line-height: 1.3;
  }
  .card-meta {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 8px;
    font-size: 11px;
    color: #666;
  }
  .card-rating {
    color: #e53935;
  }
  .card-lessons {
    color: #666;
  }
  .new-badge {
    position: absolute;
    top: 10px;
    left: 10px;
    background: #e53935;
    color: #fff;
    font-size: 10px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 4px;
    z-index: 2;
    letter-spacing: 0.5px;
  }
  .popular-badge {
    position: absolute;
    top: 10px;
    right: 10px;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(8px);
    color: #fff;
    font-size: 10px;
    font-weight: 500;
    padding: 3px 8px;
    border-radius: 4px;
    z-index: 2;
  }

  /* ── Hero (behind menu) ── */
  .hero {
    padding: 80px 40px;
    position: relative;
  }
  .hero h1 {
    font-size: 56px;
    font-weight: 700;
    line-height: 1.1;
    letter-spacing: -2px;
    max-width: 500px;
  }
  .hero h1 span { color: #e53935; }
  .hero p {
    margin-top: 16px;
    color: #888;
    font-size: 16px;
  }

  /* ── Scrollbar ── */
  .menu-categories::-webkit-scrollbar,
  .menu-detail::-webkit-scrollbar { width: 4px; }
  .menu-categories::-webkit-scrollbar-thumb,
  .menu-detail::-webkit-scrollbar-thumb {
    background: #333;
    border-radius: 2px;
  }

  /* placeholder avatar colors */
  .avatar-placeholder {
    width: 100%;
    aspect-ratio: 3/4;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    font-size: 48px;
    padding-bottom: 20px;
    position: relative;
  }
</style>
</head>

// ── Render categories ──
const menuCats = document.getElementById('menuCategories');
const menuDetail = document.getElementById('menuDetail');

categories.forEach((cat, i) => {
  const el = document.createElement('div');
  el.className = 'cat-item' + (i === 0 ? ' active' : '');
  el.setAttribute('role', 'menuitem');
  el.dataset.index = i;
  el.innerHTML = `
    <span class="cat-icon">${cat.icon}</span>
    <span class="cat-label">${cat.name}</span>
    <span class="cat-count">${cat.count}</span>
  `;
  menuCats.appendChild(el);
});

function renderDetail(cat) {
  const subcatHTML = cat.subcategories.map(s => `<span class="subcat-chip">${s}</span>`).join('');
  const cardsHTML = cat.instructors.map(inst => {
    const initials = inst.name.split(' ').map(w => w[0]).join('');
    return `
      <div class="instructor-card">
        ${inst.isNew ? '<span class="new-badge">NEW</span>' : ''}
        ${inst.popular ? '<span class="popular-badge">🔥 Popular</span>' : ''}
        <div class="avatar-placeholder" style="background: linear-gradient(135deg, ${inst.color}, ${inst.color}dd, #000);">
          <span style="font-size: 42px; font-weight: 700; opacity: 0.3; z-index:1;">${initials}</span>
        </div>
        <div class="card-info">
          <div class="card-name">${inst.name}</div>
          <div class="card-topic">${inst.topic}</div>
          <div class="card-meta">
            <span class="card-rating">★ ${inst.rating}</span>
            <span>·</span>
            <span class="card-lessons">${inst.lessons} lessons</span>
          </div>
        </div>
      </div>
    `;
  }).join('');

  menuDetail.innerHTML = `
    <div class="detail-header">
      <h2>${cat.name}</h2>
      <a href="#" class="view-all-link">View all ${cat.count} classes →</a>
    </div>
    <div class="subcategories">${subcatHTML}</div>
    <div class="instructors-grid">${cardsHTML}</div>
  `;
}

// Initial render
renderDetail(categories[0]);

// ── Hover interactions ──

  const item = e.target.closest('.cat-item');
  if (!item) return;
  clearTimeout(hoverTimeout);
  hoverTimeout = setTimeout(() => {
    document.querySelectorAll('.cat-item').forEach(el => el.classList.remove('active'));
    item.classList.add('active');
    renderDetail(categories[item.dataset.index]);
  }, 80);
});

// ── Toggle menu ──
const browseBtn = document.getElementById('browseBtn');
const megaMenu = document.getElementById('megaMenu');
const overlay = document.getElementById('overlay');

function openMenu() {
  megaMenu.classList.add('open');
  overlay.classList.add('open');
  browseBtn.classList.add('active');
  browseBtn.setAttribute('aria-expanded', 'true');
}
function closeMenu() {
  megaMenu.classList.remove('open');
  overlay.classList.remove('open');
  browseBtn.classList.remove('active');
  browseBtn.setAttribute('aria-expanded', 'false');
}

browseBtn.addEventListener('click', () => {
  megaMenu.classList.contains('open') ? closeMenu() : openMenu();
});
overlay.addEventListener('click', closeMenu);
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeMenu();
});

// ── Search filtering ──
const searchInput = document.getElementById('searchInput');
searchInput.addEventListener('input', (e) => {
  const q = e.target.value.toLowerCase().trim();
  if (q && !megaMenu.classList.contains('open')) openMenu();

  document.querySelectorAll('.cat-item').forEach(item => {
    const cat = categories[item.dataset.index];
    const match = !q ||
      cat.name.toLowerCase().includes(q) ||
      cat.subcategories.some(s => s.toLowerCase().includes(q)) ||
      cat.instructors.some(i => i.name.toLowerCase().includes(q) || i.topic.toLowerCase().includes(q));
    item.style.display = match ? '' : 'none';
  });

  if (q) {
    const firstVisible = document.querySelector('.cat-item:not([style*="display: none"])');
    if (firstVisible) {
      document.querySelectorAll('.cat-item').forEach(el => el.classList.remove('active'));
      firstVisible.classList.add('active');
      renderDetail(categories[firstVisible.dataset.index]);
    }
  }
});

// Auto-open for demo
setTimeout(openMenu, 600);
</script>

</body>
</html>
